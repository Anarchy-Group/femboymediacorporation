<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery | Femboy Media Corporation</title>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Comfortaa', cursive; background: #f8f0ff; color: #333; margin:0; padding:0; }
header { background: #fcd9f0; padding: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
header img { max-width: 200px; }
nav a { margin: 0 15px; text-decoration: none; color: #6b1cb1; font-weight: bold; transition:0.3s; }
nav a:hover { color: #ff6fcf; }

section { padding: 80px 20px; text-align: center; }
h1,h2 { color: #6b1cb1; }
h2 { margin-bottom: 40px; }
.gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
.gallery-item { background: #fff0ff; padding: 10px; border-radius: 15px; transition: 0.3s; cursor: pointer; }
.gallery-item img { width: 100%; border-radius: 15px; }
.gallery-item:hover { transform: scale(1.05); box-shadow: 0 8px 15px rgba(255,111,207,0.4); }

.btn { display: inline-block; margin-top: 20px; padding: 10px 25px; background: #ff6fcf; color:#fff; border-radius:50px; text-decoration:none; font-weight:bold; transition:0.3s; }
.btn:hover { background: #6b1cb1; }

footer { background: #fcd9f0; padding: 40px 20px; text-align: center; }
footer a { color: #6b1cb1; margin: 0 10px; text-decoration: none; font-weight: bold; }
footer a:hover { color: #ff6fcf; }
footer p { margin-top: 20px; font-size: 0.9em; color: #333; }
</style>
</head>
<body>

<header>
  <img src="your-logo.png" alt="Femboy Media Corporation Logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="community.html">Community</a>
    <a href="merch.html">Merch</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section>
  <h1>Gallery</h1>
  <p>Browse our latest media! Click on any image to view it larger. 💖</p>

  <div class="gallery-grid">
    <!-- Photo Block 1 -->
    <div class="gallery-item">
      <img src="photo1.jpg" alt="Photo 1">
    </div>

    <!-- Photo Block 2 -->
    <div class="gallery-item">
      <img src="photo2.jpg" alt="Photo 2">
    </div>

    <!-- Photo Block 3 -->
    <div class="gallery-item">
      <img src="photo3.jpg" alt="Photo 3">
    </div>

    <!-- Photo Block 4 -->
    <div class="gallery-item">
      <img src="photo4.jpg" alt="Photo 4">
    </div>

    <!-- Photo Block 5 (Duplicate as needed) -->
    <div class="gallery-item">
      <img src="photo5.jpg" alt="Photo 5">
    </div>
  </div>

  <a href="index.html" class="btn">Back to Home</a>
</section>

<footer>
  <p>Follow us on socials!</p>
  <a href="#">Twitter</a>
  <a href="#">Instagram</a>
  <a href="#">Discord</a>
  <p>© 2026 Femboy Media Corporation | Part of the Anarchy Broadcasting Authority Network</p>
</footer>

</body>
</html>
